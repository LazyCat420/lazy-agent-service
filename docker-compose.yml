services:
  lazy-service:
    image: ${IMAGE_NAME:-lazy-agent-service}:latest
    container_name: ${IMAGE_NAME:-lazy-agent-service}
    restart: unless-stopped
    ports:
      - "${PORT:-7778}:7778"
    env_file:
      - .env
    environment:
      - TZ=America/Los_Angeles
      - API_SERVER_KEY=sun-trading-secure-api-key-2026
      - CHART_OUTPUT_DIR=/app/data/charts
    volumes:
      - /usr/share/zoneinfo/America/Los_Angeles:/etc/localtime:ro
      - ./data/charts:/app/data/charts
      - ./projects.json:/app/projects.json:ro

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://localhost:7778/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 2G
